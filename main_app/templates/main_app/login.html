{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back! - Nersha ERP</title>
    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg-color: #f8f9fa;
            --text-color: #333;
            --muted-color: #777;
            --white: #ffffff;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: url("{% static 'image/oglogin.png' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Left Side: Illustration */
        .illustration-side {
            flex: 1.2;
            background-image: url("{{ MEDIA_URL }}loginimg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Right Side: Form */
        .form-side {
            flex: 1;
            background: linear-gradient(135deg, #fffaf0 0%, #ffe8cc 50%, #ffcc80 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            z-index: 1;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .header-section {
            margin-bottom: 30px;
        }

        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .header-section p {
            color: var(--muted-color);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-color);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: #2575fc;
            box-shadow: 0 0 0 4px rgba(37, 117, 252, 0.1);
        }

        /* Custom "I'm not a robot" style */
        .captcha-container {
            margin-bottom: 20px;
            padding: 15px;
            border: none;
            border-radius: var(--border-radius);
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            color: var(--muted-color);
            cursor: pointer;
        }

        .remember-me input {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            accent-color: #2575fc;
        }

        .forgot-password {
            font-size: 0.85rem;
            color: #2575fc;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-password:hover {
            color: #6a11cb;
        }

        .btn-signin {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--border-radius);
            background: var(--primary-gradient);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(37, 117, 252, 0.3);
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 117, 252, 0.4);
            filter: brightness(1.1);
        }

        .btn-signin:active {
            transform: translateY(0);
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            border: 2px solid #2575fc;
            border-radius: var(--border-radius);
            background: transparent;
            color: #2575fc;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 15px;
            text-align: center;
            display: inline-block;
            text-decoration: none;
        }

        .btn-register:hover {
            background: rgba(37, 117, 252, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(37, 117, 252, 0.2);
            color: #2575fc;
        }

        .error-messages {
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px;
            border-radius: var(--border-radius);
            font-size: 0.85rem;
            text-align: center;
            background-color: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .illustration-side {
                display: none;
            }

            .form-side {
                flex: 1;
            }
        }

        @media (max-width: 576px) {
            .form-side {
                padding: 20px;
            }

            .header-section h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <!-- Left Side -->
        <div class="illustration-side"></div>

        <!-- Right Side -->
        <div class="form-side">
            <div class="login-card">
                <div class="header-section">
                    <h1>Welcome Back!</h1>
                    <p>Continue your journey towards success</p>
                </div>

                <!-- Error Messages -->
                {% if messages %}
                <div class="error-messages">
                    {% for message in messages %}
                    {% if message.tags == 'error' %}
                    <div class="alert">
                        {{ message }}
                    </div>
                    {% endif %}
                    {% endfor %}
                </div>
                {% endif %}

                <!-- Login Form -->
                <form action="{% url 'user_login' %}" method="post">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" class="form-control"
                                placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" class="form-control"
                                placeholder="Enter your password" required>
                        </div>
                    </div>



                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember" id="remember" value="1">
                            Remember me
                        </label>
                        <a href="{% url 'password_reset' %}" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-signin">Sign In</button>
                    <a href="{% url 'student_register' %}" class="btn-register"><i class="fas fa-user-plus" style="margin-right: 8px;"></i>Create Account / Register</a>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
