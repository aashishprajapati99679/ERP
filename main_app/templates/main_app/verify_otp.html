{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Verify OTP - Nersha ERP</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --text-color: #2d3748;
            --muted-color: #718096;
            --border-radius: 12px;
            --transition: all 0.3s ease;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-image: url("{% static 'image/oglogin.png' %}");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .header-section {
            margin-bottom: 30px;
        }

        .header-section h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .header-section p {
            color: var(--muted-color);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-color);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted-color);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: #2575fc;
            box-shadow: 0 0 0 4px rgba(37, 117, 252, 0.1);
        }

        .btn-signin {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--border-radius);
            background: var(--primary-gradient);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(37, 117, 252, 0.3);
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 117, 252, 0.4);
            filter: brightness(1.1);
        }

        .error-messages {
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px;
            border-radius: var(--border-radius);
            font-size: 0.85rem;
            text-align: center;
            background-color: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header-section">
            <h1>Email Verification</h1>
            <p>Please enter the OTP sent to your email.</p>
        </div>

        {% if messages %}
        <div class="error-messages">
            {% for message in messages %}
            <div class="alert alert-{{message.tags}}">
                {{message}}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form action="{% url 'verify_otp' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="otp">One-Time Password (OTP)</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="text" id="otp" name="otp" class="form-control" placeholder="Enter 6-digit OTP" required>
                </div>
            </div>
            <button type="submit" class="btn-signin">Verify OTP</button>
        </form>
    </div>
</body>
</html>
